name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ailex:
    name: Ailex Node.js 24
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run Ailex conformance suite
        run: npm test

  container:
    name: Container demo
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build pinned image
        run: docker build --pull -t intentir:ci .
      - name: Verify non-root user
        run: test "$(docker run --rm --entrypoint id intentir:ci -u)" = "10001"
      - name: Run isolated demonstration
        run: >-
          docker run --rm
          --network none
          --read-only
          --tmpfs /tmp:rw,noexec,nosuid,size=64m
          intentir:ci

  core:
    name: Core Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m compileall -q intentir tests
      - name: Test dependency-free installation
        run: python -m unittest discover -s tests -v
      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist

  mcp:
    name: Optional MCP stdio
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install locked environment tool
        run: python -m pip install uv==0.11.16
      - name: Sync MCP dependencies from lock
        run: uv sync --frozen --extra mcp
      - name: Test with MCP SDK
        run: uv run --frozen --extra mcp python -m unittest discover -s tests -v
