<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blog — Ailex</title>
<meta name="description" content="Notes on building Ailex, a language designed for AI to write.">
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --ink: #e6edf3; --muted: #8b949e;
    --accent: #58a6ff; --border: #30363d; --code-bg: #0d1117;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg: #ffffff; --panel: #f6f8fa; --ink: #1f2328; --muted: #59636e;
      --accent: #0969da; --border: #d1d9e0; --code-bg: #f6f8fa; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.7 ui-sans-serif, system-ui, "Segoe UI", sans-serif; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 20px 60px; }
  header { padding: 44px 0 8px; }
  h1 { font-size: 32px; margin: 0; letter-spacing: -0.5px; }
  .tag { color: var(--muted); margin: 6px 0 0; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .post { border: 1px solid var(--border); border-radius: 10px; background: var(--panel);
    padding: 18px 20px; margin: 16px 0; display: block; color: var(--ink); }
  .post:hover { border-color: var(--accent); text-decoration: none; }
  .post h2 { margin: 0 0 4px; font-size: 19px; color: var(--accent); }
  .post .meta { color: var(--muted); font-size: 13.5px; }
  .post p { margin: 8px 0 0; color: var(--ink); font-size: 15px; }
  .back { font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="back"><a href="../">← Ailex</a></p>
    <h1>Blog</h1>
    <p class="tag">Notes from building Ailex — written from measurement logs. Articles are in English (some have Japanese translations).</p>
  </header>
  <div id="list"></div>
</div>
<script>
// 記事はここに1行足すだけ（posts/<slug>.md を置く）。新しい順に上へ。
const POSTS = [
  { slug: "measure-fix-remeasure", lang: "en", date: "2026-07-13",
    title: "An invalid form that models repeatedly write is a measurement",
    summary: "Lambda annotations and map-over-Option: two measured cases where the language, not the model, was the thing to fix. Both times the models' unchanged first attempt became correct after the fix.", ja: "measure-fix-remeasure.ja" },
];
const list = document.getElementById("list");
for (const p of POSTS) {
  const a = document.createElement("a");
  a.className = "post";
  a.href = `post.html?p=${encodeURIComponent(p.slug)}`;
  a.innerHTML = `<h2>${p.title}</h2><div class="meta">${p.date}${p.ja ? ' · <a href="post.html?p=' + p.ja + '">日本語版</a>' : ""}</div><p>${p.summary}</p>`;
  list.appendChild(a);
}
</script>
</body>
</html>
