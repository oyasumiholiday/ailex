<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ailex Blog</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --ink: #e6edf3; --muted: #8b949e;
    --accent: #58a6ff; --border: #30363d; --code-bg: #0d1117;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg: #ffffff; --panel: #f6f8fa; --ink: #1f2328; --muted: #59636e;
      --accent: #0969da; --border: #d1d9e0; --code-bg: #f6f8fa; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.85 ui-sans-serif, system-ui, "Segoe UI", sans-serif; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 20px 80px; }
  header { padding: 40px 0 0; }
  .back { font-size: 14px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  article h1 { font-size: 30px; line-height: 1.35; letter-spacing: -0.5px; margin: 18px 0 6px; }
  article h2 { font-size: 21px; margin: 34px 0 8px; }
  article h3 { font-size: 17px; margin: 26px 0 6px; }
  article p { margin: 14px 0; }
  article blockquote { margin: 16px 0; padding: 2px 18px; border-left: 3px solid var(--accent);
    color: var(--muted); background: var(--panel); border-radius: 0 8px 8px 0; }
  article code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 5px; padding: 1px 6px; }
  article pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; overflow-x: auto; }
  article pre code { background: none; border: none; padding: 0; font-size: 13.5px; line-height: 1.6; }
  article ul, article ol { padding-left: 24px; }
  article li { margin: 6px 0; }
  article table { border-collapse: collapse; margin: 16px 0; width: 100%; font-size: 15px; }
  article th, article td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; }
  article th { background: var(--panel); }
  article hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
  .meta { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <header><p class="back"><a href="./">← Blog</a> · <a href="../">Ailex</a></p></header>
  <article id="article"><p style="color:var(--muted)">Loading…</p></article>
</div>
<script>
// 最小 Markdown レンダラ（見出し/段落/リスト/コード/引用/表/太字/リンク/罫線）
function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function inline(s) {
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
  s = s.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2">$1</a>');
  return s;
}
function render(md) {
  const lines = md.split("\n"); const out = []; let i = 0;
  while (i < lines.length) {
    const ln = lines[i];
    if (ln.startsWith("```")) {
      const buf = []; i++;
      while (i < lines.length && !lines[i].startsWith("```")) buf.push(lines[i++]);
      i++; out.push(`<pre><code>${esc(buf.join("\n"))}</code></pre>`); continue;
    }
    if (/^\|/.test(ln)) {
      const rows = [];
      while (i < lines.length && /^\|/.test(lines[i])) {
        const cells = lines[i].replace(/^\||\|$/g, "").split("|").map((c) => c.trim());
        if (!cells.every((c) => /^[-: ]+$/.test(c))) rows.push(cells);
        i++;
      }
      if (rows.length) {
        const [h, ...body] = rows;
        out.push("<table><tr>" + h.map((c) => `<th>${inline(c)}</th>`).join("") + "</tr>" +
          body.map((r) => "<tr>" + r.map((c) => `<td>${inline(c)}</td>`).join("") + "</tr>").join("") + "</table>");
      }
      continue;
    }
    if (/^---+$/.test(ln.trim())) { out.push("<hr>"); i++; continue; }
    if (ln.startsWith("### ")) { out.push(`<h3>${inline(ln.slice(4))}</h3>`); i++; continue; }
    if (ln.startsWith("## ")) { out.push(`<h2>${inline(ln.slice(3))}</h2>`); i++; continue; }
    if (ln.startsWith("# ")) { out.push(`<h1>${inline(ln.slice(2))}</h1>`); i++; continue; }
    if (ln.startsWith("> ")) {
      const buf = [];
      while (i < lines.length && lines[i].startsWith(">")) buf.push(lines[i++].replace(/^>\s?/, ""));
      out.push(`<blockquote><p>${buf.map(inline).join("<br>")}</p></blockquote>`); continue;
    }
    if (/^[-*] /.test(ln)) {
      const buf = [];
      while (i < lines.length && /^[-*] /.test(lines[i])) buf.push(lines[i++].slice(2));
      out.push("<ul>" + buf.map((x) => `<li>${inline(x)}</li>`).join("") + "</ul>"); continue;
    }
    if (/^\d+\. /.test(ln)) {
      const buf = [];
      while (i < lines.length && /^\d+\. /.test(lines[i])) buf.push(lines[i++].replace(/^\d+\. /, ""));
      out.push("<ol>" + buf.map((x) => `<li>${inline(x)}</li>`).join("") + "</ol>"); continue;
    }
    if (ln.trim() === "") { i++; continue; }
    const buf = [ln]; i++;
    while (i < lines.length && lines[i].trim() !== "" && !/^(#|>|[-*] |\d+\. |\||```|---)/.test(lines[i])) buf.push(lines[i++]);
    out.push(`<p>${inline(buf.join(" "))}</p>`);
  }
  return out.join("\n");
}
const slug = new URLSearchParams(location.search).get("p");
const el = document.getElementById("article");
if (!slug || !/^[\w.-]+$/.test(slug)) { el.innerHTML = "<p>Not found.</p>"; }
else fetch(`posts/${slug}.md`).then((r) => { if (!r.ok) throw 0; return r.text(); })
  .then((md) => {
    el.innerHTML = render(md);
    const h1 = el.querySelector("h1");
    if (h1) document.title = h1.textContent + " — Ailex Blog";
  })
  .catch(() => { el.innerHTML = "<p>Not found.</p>"; });
</script>
</body>
</html>
